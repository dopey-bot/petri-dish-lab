<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Predictability Lab | Live Global Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; user-select: none; }
        body, html { height: 100%; width: 100%; background-color: #0b0f19; color: #f8fafc; overflow: hidden; }
        #app { position: relative; height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: crosshair; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0; transition: opacity 1s ease; }
        #ui-layer { position: relative; z-index: 10; text-align: center; pointer-events: none; width: 100%; padding: 20px; }
        h1 { font-size: 3rem; font-weight: 300; letter-spacing: 2px; margin-bottom: 10px; transition: opacity 0.3s; }
        .results { display: none; background: rgba(11, 15, 25, 0.9); padding: 40px; border-radius: 16px; border: 1px solid #1e293b; backdrop-filter: blur(12px); max-width: 450px; margin: 0 auto; pointer-events: auto; animation: slideUp 0.8s ease forwards; }
        .score { font-size: 3.5rem; font-weight: 800; color: #38bdf8; margin: 5px 0; }
        .diagnosis { font-size: 1.1rem; color: #94a3b8; margin-bottom: 15px; }
        .cluster-status { padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 25px; background: rgba(255,255,255,0.05); }
        .action-button { display: block; width: 100%; background: #1e293b; color: #f8fafc; border: 1px solid #334155; padding: 18px 20px; font-size: 1.1rem; font-weight: 600; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; }
        .action-button:hover { background: #334155; transform: translateY(-2px); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="app">
        <canvas id="heatmap"></canvas>
        <div id="ui-layer">
            <h1 id="instruction">Clear your mind.<br>Tap anywhere.</h1>
            <div id="results" class="results">
                <div class="diagnosis" style="font-size:0.9rem; text-transform:uppercase;">Predictability Score</div>
                <div class="score"><span id="percentage">0</span>%</div>
                <p id="diagnosis" class="diagnosis">Analyzing spatial bias...</p>
                <div id="cluster-banner" class="cluster-status">Checking global clusters...</div>
                <button class="action-button" onclick="location.reload()">Reset Lab Canvas</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. INITIALIZE SUPABASE ---
        const SUPABASE_URL = 'https://zdsejflxtilybqdogcyq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_wpKaS7oeS9GUTO4xHhymDQ_fK-v-1fk';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

       // --- 2. APP LOGIC & CANVAS SETUP ---
        const canvas = document.getElementById('heatmap');
        const ctx = canvas.getContext('2d');
        const app = document.getElementById('app');
        
        let hasTapped = false;
        let cw, ch;
        
        // Animation variables
        const TAP_LIFESPAN = 4000; // 4 seconds before the dots completely vanish
        let activeTaps = [];

        function resizeCanvas() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 3. THE ANIMATION ENGINE ---
        function animateFrame() {
            ctx.clearRect(0, 0, cw, ch);
            let currentTime = performance.now();

            activeTaps = activeTaps.filter(tap => {
                let age = currentTime - tap.spawnTime;
                if (age >= TAP_LIFESPAN) return false; // Remove dead taps

                let lifeRatio = age / TAP_LIFESPAN;
                let opacity = 1 - lifeRatio; 

                ctx.globalAlpha = opacity;

                if (tap.isUser) {
                    // Draw the user's special pulse ring
                    ctx.beginPath();
                    // The ring expands slightly as it fades
                    ctx.arc(tap.x, tap.y, 25 + (lifeRatio * 15), 0, Math.PI * 2); 
                    ctx.strokeStyle = tap.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Draw the user's core dot
                    ctx.beginPath();
                    ctx.arc(tap.x, tap.y, 6, 0, Math.PI * 2);
                    ctx.fillStyle = tap.color;
                    ctx.fill();
                } else {
                    // Draw standard global history dots
                    ctx.beginPath();
                    ctx.arc(tap.x, tap.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = tap.color;
                    ctx.fill();
                }

                return true; 
            });

            ctx.globalAlpha = 1.0; // Reset opacity
            requestAnimationFrame(animateFrame);
        }

        // Start the animation loop immediately (it just draws an empty screen until they tap)
        animateFrame(); 

        // --- 4. INTERACTION HANDLING ---
        app.addEventListener('click', (e) => { if (!hasTapped) { hasTapped = true; processTap(e.clientX, e.clientY); }});
        app.addEventListener('touchstart', (e) => { if (!hasTapped) { hasTapped = true; processTap(e.touches[0].clientX, e.touches[0].clientY); }});

        async function processTap(x, y) {
            document.getElementById('instruction').style.opacity = '0';
            canvas.style.opacity = '1'; // Ensure canvas is visible
            
            // 1. Convert tap to percentage
            const xPercent = x / cw;
            const yPercent = y / ch;

            // 2. SEND to Supabase instantly
            await db.from('global_taps').insert([{ x_percent: xPercent, y_percent: yPercent }]);

            // 3. Add the User's tap to the animation array
            activeTaps.push({
                x: x,
                y: y,
                color: '#38bdf8', // Bright blue for the user
                isUser: true,
                spawnTime: performance.now()
            });

            // 4. FETCH the world's history from Supabase
            const { data: globalTaps } = await db
                .from('global_taps')
                .select('x_percent, y_percent')
                .limit(1000) // Pull the last 1000 taps
                .order('created_at', { ascending: false });

            // 5. Add history to the animation array
            if (globalTaps) {
                let now = performance.now();
                globalTaps.forEach(tap => {
                    activeTaps.push({
                        x: tap.x_percent * cw,
                        y: tap.y_percent * ch,
                        color: 'rgba(56, 189, 248, 0.4)', // Faint blue for history
                        isUser: false,
                        spawnTime: now // Start their fade countdown right now
                    });
                });
            }
            
            calculateResults(x, y);
        }

        // --- 5. CALCULATIONS ---
        function calculateResults(x, y) {
            const centerX = cw / 2; const centerY = ch / 2;
            const distance = Math.hypot(x - centerX, y - centerY);
            const maxDistance = Math.hypot(centerX, centerY);
            let predictability = 100 - ((distance / maxDistance) * 100);
            predictability = Math.min(99.9, Math.max(45, predictability + 30));

            setTimeout(() => {
                document.getElementById('results').style.display = 'block';
                document.getElementById('percentage').innerText = predictability.toFixed(1);
                
                const diagP = document.getElementById('diagnosis');
                if (predictability > 85) diagP.innerText = "You share a clicking profile with the global majority today. Your brain seeks the center.";
                else if (predictability > 60) diagP.innerText = "You drifted slightly off-center, letting your dominant hand dictate your choice.";
                else diagP.innerText = "The Rebel. You actively tried to outsmart the test.";

                const banner = document.getElementById('cluster-banner');
                banner.style.color = '#38bdf8'; 
                banner.style.border = '1px solid #38bdf8';
                banner.innerText = "🌐 Your tap has been permanently added to the global lab.";
            }, 1200); // UI pops up after 1.2 seconds, while the dots are still fading behind it!
        }
    </script>
</body>
</html>
